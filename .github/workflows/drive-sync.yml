# Committing binary index files (faiss_index.bin, chunk_store.db) directly to git is a
# deliberate simplicity choice at this scale; at higher sync frequency or larger index
# size this would move to object storage (S3/GCS) instead.

name: Drive KB Sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: drive-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            huggingface-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Write service account credentials
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: echo "$GDRIVE_SERVICE_ACCOUNT_JSON" > service_account.json

      - name: Run full Drive sync
        env:
          GDRIVE_SA_FILE: service_account.json
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          SYNC_STATE_FILE: data/gdrive_sync_state.json
          FAISS_INDEX_PATH: faiss_index.bin
          CHUNK_STORE_DB: chunk_store.db
        run: python scripts/run_full_sync.py

      - name: Commit and push index artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add faiss_index.bin chunk_store.db data/gdrive_sync_state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync Drive KB index from scheduled workflow"
            git push
          else
            echo "No index changes to commit."
          fi

      - name: Remove service account credentials
        if: always()
        run: rm -f service_account.json

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev tools
        run: pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format (check only)
        run: ruff format --check .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # Needs OPENAI_API_KEY in repo Actions secrets. Skipped on fork PRs (secrets unavailable).
  eval-regression:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork == false
    needs: [lint, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            huggingface-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVAL_RUN_JUDGES: "false"
          LANGCHAIN_TRACING_V2: "false"
          LANGSMITH_TRACING: "false"
        run: python -m app.eval.run_eval

      - name: Regression vs baseline
        run: |
          REPORT=$(ls -t reports/eval_run_*.jsonl | head -1)
          echo "Using report: $REPORT"
          python -m app.eval.regression \
            --baseline app/eval/regression_baseline.json \
            --report "$REPORT"

      - name: Upload eval report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: reports/eval_run_*.jsonl
          if-no-files-found: ignore
